<section class="page-header">
  <div>
    <h1>Categories</h1>
    <p>Manage product categories</p>
  </div>

  @if (authStore.isAdmin()) {
    <button mat-flat-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      Add Category
    </button>
  }
</section>

<section class="filters">
  <mat-form-field appearance="outline">
    <mat-label>Search</mat-label>
    <input matInput [formControl]="searchCtrl" placeholder="Search categories..." />
  </mat-form-field>
</section>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

<div class="table-wrapper">
  <table mat-table [dataSource]="items()" class="mat-elevation-z1">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let category">{{ category.name }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let category">{{ category.description ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="created_at">
      <th mat-header-cell *matHeaderCellDef>Created</th>
      <td mat-cell *matCellDef="let category">{{ category.created_at | date:'mediumDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let category">
        @if (authStore.isAdmin()) {
          <button
            mat-icon-button
            type="button"
            [routerLink]="[category.id, 'edit']"
            matTooltip="Edit category"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            (click)="deleteCategory(category)"
            matTooltip="Delete category"
          >
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>
</div>

<mat-paginator
  [length]="total()"
  [pageIndex]="page()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[10, 25, 50]"
  (page)="onPage($event)"
/>
