<mat-card>
  <mat-card-header>
    <mat-card-title>{{ supplierId() ? 'Edit Supplier' : 'New Supplier' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form class="form-grid" [formGroup]="form" (ngSubmit)="save()">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput rows="4" formControlName="description"></textarea>
      </mat-form-field>

      <div class="actions full-width">
        <button mat-stroked-button type="button" routerLink="/catalog/suppliers">Cancel</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Save</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
