<section class="page-header">
  <div>
    <h1>Stock receiving</h1>
    <p>Track inbound stock receipts and supplier deliveries.</p>
  </div>
  <button mat-flat-button color="primary" type="button" (click)="openCreate()">New receipt</button>
</section>

<div class="table-wrapper">
  <table mat-table [dataSource]="receipts()" class="mat-elevation-z1">
    <ng-container matColumnDef="receipt_number">
      <th mat-header-cell *matHeaderCellDef>Receipt #</th>
      <td mat-cell *matCellDef="let receipt">{{ receipt.receipt_number }}</td>
    </ng-container>

    <ng-container matColumnDef="supplier">
      <th mat-header-cell *matHeaderCellDef>Supplier</th>
      <td mat-cell *matCellDef="let receipt">{{ receipt.supplier_id ?? 'Walk-in / N/A' }}</td>
    </ng-container>

    <ng-container matColumnDef="received_at">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let receipt">{{ receipt.received_at | date:'mediumDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="items">
      <th mat-header-cell *matHeaderCellDef>Items Count</th>
      <td mat-cell *matCellDef="let receipt">{{ receipt.items.length }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<mat-paginator [length]="total()" [pageIndex]="pageIndex()" [pageSize]="pageSize()" [pageSizeOptions]="[5, 10, 25]" (page)="handlePage($event)" />
